name: Weekly AI Digest Bot

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
on:
  schedule:
    - cron: "30 4 * * 0"
  workflow_dispatch:

jobs:
  weekly-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Restore Gmail credentials
        shell: bash
        run: |
          mkdir -p fetcher
          echo "$GMAIL_CREDENTIALS_JSON_B64" | base64 -d > fetcher/gmail_credentials.json
          echo "$GMAIL_TOKEN_JSON_B64" | base64 -d > fetcher/token.json
        env:
          GMAIL_CREDENTIALS_JSON_B64: ${{ secrets.GMAIL_CREDENTIALS_JSON_B64 }}
          GMAIL_TOKEN_JSON_B64: ${{ secrets.GMAIL_TOKEN_JSON_B64 }}

      - name: Run weekly bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          QNA_HOURS: "2"
        run: uv run python discord_bot.py
